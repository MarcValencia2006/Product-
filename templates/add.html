{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-gold p-5">
            <h2 class="mb-4 text-center" style="color: var(--gold-primary);">ALTA DE ACTIVO</h2>
            <form action="{{ url_for('create') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted">Nombre del Artículo</label>
                    <input type="text" name="name" class="form-control form-luxury" required placeholder="Ingrese nombre completo">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label text-muted">Precio Sugerido (USD)</label>
                        <input type="number" step="0.01" name="price" class="form-control form-luxury" required placeholder="0.00">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label text-muted">Stock Inicial</label>
                        <input type="number" name="stock" class="form-control form-luxury" required placeholder="0">
                    </div>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-gold-solid">REGISTRAR EN BASE DE DATOS</button>
                    <a href="{{ url_for('index') }}" class="btn btn-link text-white-50 text-decoration-none text-center">Cancelar operación</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

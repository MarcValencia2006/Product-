{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-gold p-5">
            <h2 class="mb-4 text-center" style="color: var(--gold-primary);">MODIFICAR PRODUCTO</h2>
            <p class="text-center text-muted">Editando Referencia ID: #{{ product.id }}</p>
            <form action="{{ url_for('update', id=product.id) }}" method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted">Nombre del Artículo</label>
                    <input type="text" name="name" class="form-control form-luxury" value="{{ product.name }}" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label text-muted">Precio Unitario</label>
                        <input type="number" step="0.01" name="price" class="form-control form-luxury" value="{{ product.price }}" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label text-muted">Existencias</label>
                        <input type="number" name="stock" class="form-control form-luxury" value="{{ product.stock }}" required>
                    </div>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-gold-solid">ACTUALIZAR REGISTRO</button>
                    <a href="{{ url_for('index') }}" class="btn btn-link text-white-50 text-decoration-none text-center">Descartar cambios</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
